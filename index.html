<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chameleon Engine</title>
<style>
body { margin:0; overflow:hidden; background:#0b0b0b; }
canvas { display:block; }
#ui {
    position:fixed;
    top:10px; left:10px;
    color:white;
    font-family:Arial;
    font-size:13px;
    z-index:10;
    background:rgba(0,0,0,0.4);
    padding:10px;
}
</style>
</head>
<body>

<div id="ui">
WASD move | SPACE jump | SHIFT copy color | MOUSE draw | Z undo | R reset | S save
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
    c.width = innerWidth;
    c.height = innerHeight;
}
addEventListener("resize", resize);
resize();

// CAMERA
const cam = {x:0,y:0};

// PLAYER
const p = {
    x:100,y:100,w:20,h:20,
    vx:0,vy:0,
    speed:3,
    jump:10,
    grounded:false,
    color:"white",
    copied:null
};

// GOAL
const goal = {x:2000,y:300,w:40,h:40};

// ZONES (color copy stations)
const zones = [
    {x:300,y:200,w:100,h:100,color:"red"},
    {x:900,y:400,w:100,h:100,color:"blue"},
    {x:1500,y:300,w:100,h:100,color:"yellow"}
];

// ENEMIES
let enemies = [
    {x:600,y:200,w:20,h:20,dir:1},
    {x:1200,y:200,w:20,h:20,dir:-1}
];

// LEVEL DATA (drawn)
let blocks = [];
let history = [];

// INPUT
const k = {};
addEventListener("keydown", e=>k[e.key.toLowerCase()]=true);
addEventListener("keyup", e=>k[e.key.toLowerCase()]=false);

// DRAW MODE
let drawing = false;
addEventListener("mousedown", ()=>drawing=true);
addEventListener("mouseup", ()=>drawing=false);

addEventListener("mousemove", e=>{
    if(!drawing) return;
    const rect = c.getBoundingClientRect();

    blocks.push({
        x: e.clientX + cam.x,
        y: e.clientY + cam.y,
        w: 80,
        h: 20,
        color:"gray"
    });
});

// PHYSICS
function collide(a,b){
    return a.x < b.x+b.w &&
           a.x+a.w > b.x &&
           a.y < b.y+b.h &&
           a.y+a.h > b.y;
}

// ZONE CHECK
function inZone(z){
    return p.x < z.x+z.w &&
           p.x+p.w > z.x &&
           p.y < z.y+z.h &&
           p.y+p.h > z.y;
}

// SAVE
function save(){
    localStorage.setItem("level", JSON.stringify(blocks));
}

// LOAD
function load(){
    const d = localStorage.getItem("level");
    if(d) blocks = JSON.parse(d);
}
load();

// UPDATE
function update(){

    // movement
    if(k["a"]) p.vx = -p.speed;
    else if(k["d"]) p.vx = p.speed;
    else p.vx *= 0.8;

    if(k["w"] && p.grounded){
        p.vy = -p.jump;
        p.grounded = false;
    }

    // copy color
    if(k[" "]){
        zones.forEach(z=>{
            if(inZone(z)) p.copied = z.color;
        });
    }

    // gravity
    p.vy += 0.5;

    p.x += p.vx;
    p.y += p.vy;

    p.grounded = false;

    // collision blocks
    for(let b of blocks){
        if(collide(p,b)){
            if(p.vy > 0){
                p.y = b.y - p.h;
                p.vy = 0;
                p.grounded = true;
            }
        }
    }

    // enemies AI
    for(let e of enemies){
        e.x += e.dir * 2;
        if(e.x < 400 || e.x > 1600) e.dir *= -1;

        if(collide(p,e)){
            p.x = 100; p.y = 100;
        }
    }

    // win
    if(collide(p,goal)){
        alert("YOU MADE IT. NOW MAKE IT HARDER.");
        p.x = 100; p.y = 100;
    }

    // camera follow
    cam.x = p.x - innerWidth/2;
    cam.y = p.y - innerHeight/2;
}

// DRAW
function draw(){
    ctx.clearRect(0,0,c.width,c.height);

    ctx.save();
    ctx.translate(-cam.x,-cam.y);

    // zones
    zones.forEach(z=>{
        ctx.fillStyle=z.color;
        ctx.fillRect(z.x,z.y,z.w,z.h);
    });

    // goal
    ctx.fillStyle="lime";
    ctx.fillRect(goal.x,goal.y,goal.w,goal.h);

    // blocks
    blocks.forEach(b=>{
        ctx.fillStyle=b.color;
        ctx.fillRect(b.x,b.y,b.w,b.h);
    });

    // enemies
    enemies.forEach(e=>{
        ctx.fillStyle="red";
        ctx.fillRect(e.x,e.y,e.w,e.h);
    });

    // player
    ctx.fillStyle = p.copied || "white";
    ctx.fillRect(p.x,p.y,p.w,p.h);

    ctx.restore();

    ctx.fillStyle="white";
    ctx.fillText("Color: "+(p.copied||"none"),20,20);
}

// CONTROLS
addEventListener("keydown", e=>{
    if(e.key.toLowerCase()=="z"){
        blocks.pop();
    }
    if(e.key.toLowerCase()=="r"){
        blocks=[];
        localStorage.removeItem("level");
    }
    if(e.key.toLowerCase()=="s"){
        save();
    }
});

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
